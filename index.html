  <style>
    * {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0) !important;
        -webkit-focus-ring-color: rgba(255, 255, 255, 0) !important;

    }

 .bottom-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.bottom-text div {

  padding: 0;
}

/* 📱 Mobile View */
@media (max-width: 768px) {
  .bottom-text img {
    width: 170px;     /* increase image size on mobile */
  }
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>thankyou</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #ff4c4c;
        }

        h2 {
            margin: 10px 0;
            font-weight: normal;
        }

        p {
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #0056b3;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <h2>Images Not Found</h2>
        <p>The requested images have been deleted or are no longer available.</p>
        <p>Please contact sender.</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>
</body>
</html>
